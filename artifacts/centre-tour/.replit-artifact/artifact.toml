kind = "web"
previewPath = "/"
title = "Centre Tour Booking Calendar"
version = "1.0.0"
id = "artifacts/centre-tour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21651

[services.development]
run = "pnpm --filter @workspace/centre-tour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/centre-tour", "run", "build" ]
publicDir = "artifacts/centre-tour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21651"
BASE_PATH = "/"
