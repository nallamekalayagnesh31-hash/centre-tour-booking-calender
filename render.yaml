services:
  - type: web
    name: centre-tour-booking-calender
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm -w run build:render
    # start:render runs: drizzle-kit push (create tables) -> seed (create staff users) -> start server
    startCommand: pnpm -w run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        # REQUIRED: Set this to your PostgreSQL connection string in the Render dashboard
        sync: false
